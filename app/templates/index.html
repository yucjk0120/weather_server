<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>気象ステーション</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;color:#333}
header{background:#1a73e8;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:8px}
header h1{font-size:1.1rem;font-weight:600}
.status{width:8px;height:8px;border-radius:50%;background:#4caf50;flex-shrink:0}
.status.offline{background:#f44336}
.current{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;padding:12px 16px}
.card{background:#fff;border-radius:8px;padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card .label{font-size:.7rem;color:#888;text-transform:uppercase;letter-spacing:.5px}
.card .value{font-size:1.5rem;font-weight:700;margin-top:2px}
.card .unit{font-size:.8rem;color:#666;font-weight:400}
.range-bar{display:flex;gap:4px;padding:8px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.range-bar button{flex-shrink:0;padding:6px 12px;border:1px solid #ddd;border-radius:16px;background:#fff;font-size:.75rem;color:#555;cursor:pointer;transition:all .15s}
.range-bar button.active{background:#1a73e8;color:#fff;border-color:#1a73e8}
.range-bar button:hover:not(.active){background:#e8f0fe}
.charts{padding:0 16px 16px}
.chart-box{background:#fff;border-radius:8px;padding:12px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.chart-box h2{font-size:.85rem;color:#555;margin-bottom:8px}
canvas{width:100%!important;height:200px!important}
.time-info{text-align:center;padding:4px;font-size:.7rem;color:#999}
</style>
</head>
<body>
<header>
  <div class="status" id="statusDot"></div>
  <h1>気象ステーション</h1>
</header>

<div class="current" id="currentCards">
  <div class="card"><div class="label">気温</div><div class="value" id="cur-temp">--<span class="unit"> °C</span></div></div>
  <div class="card"><div class="label">湿度</div><div class="value" id="cur-hum">--<span class="unit"> %</span></div></div>
  <div class="card"><div class="label">雨量</div><div class="value" id="cur-rain">--<span class="unit"> mm/h</span></div></div>
  <div class="card"><div class="label">風速</div><div class="value" id="cur-wind">--<span class="unit"> m/s</span></div></div>
  <div class="card"><div class="label">風向</div><div class="value" id="cur-dir">--<span class="unit"> °</span></div></div>
  <div class="card"><div class="label">照度</div><div class="value" id="cur-lux">--<span class="unit"> lux</span></div></div>
  <div class="card"><div class="label">UV指数</div><div class="value" id="cur-uv">--</div></div>
</div>

<div class="range-bar" id="rangeBar">
  <button data-hours="6">6時間</button>
  <button data-hours="12">12時間</button>
  <button data-hours="24" class="active">24時間</button>
  <button data-hours="48">48時間</button>
  <button data-hours="72">72時間</button>
  <button data-hours="168">7日間</button>
  <button data-hours="336">14日間</button>
  <button data-hours="744">1ヶ月</button>
</div>

<div class="time-info" id="timeInfo">データなし</div>

<div class="charts">
  <div class="chart-box"><h2>気温・湿度</h2><canvas id="chartTempHum"></canvas></div>
  <div class="chart-box"><h2>雨量</h2><canvas id="chartRain"></canvas></div>
  <div class="chart-box"><h2>風速</h2><canvas id="chartWind"></canvas></div>
  <div class="chart-box"><h2>照度・UV</h2><canvas id="chartLight"></canvas></div>
</div>

<script>
const ts = v => new Date(v * 1000);
const fmt = v => v != null ? v.toFixed(1) : '--';
const allCharts = [];
let currentRangeHours = 24;

// --- 現在値パネル更新 ---
function updateCurrent(r) {
  document.getElementById('cur-temp').innerHTML = fmt(r.temperature) + '<span class="unit"> °C</span>';
  document.getElementById('cur-hum').innerHTML = fmt(r.humidity) + '<span class="unit"> %</span>';
  document.getElementById('cur-rain').innerHTML = fmt(r.rainfall_rate) + '<span class="unit"> mm/h</span>';
  document.getElementById('cur-wind').innerHTML = fmt(r.wind_avg) + '<span class="unit"> m/s</span>';
  document.getElementById('cur-dir').innerHTML = fmt(r.wind_dir) + '<span class="unit"> °</span>';
  document.getElementById('cur-lux').innerHTML = (r.illuminance != null ? Math.round(r.illuminance) : '--') + '<span class="unit"> lux</span>';
  document.getElementById('cur-uv').innerHTML = fmt(r.uv_index);
  document.getElementById('timeInfo').textContent = '最終更新: ' + ts(r.recorded_at).toLocaleString('ja-JP');
}

// --- Chart.js 共通設定 ---
function timeDisplayFormats(hours) {
  if (hours <= 24)  return { minute: 'HH:mm', hour: 'HH:mm' };
  if (hours <= 72)  return { hour: 'M/d HH:mm', day: 'M/d' };
  return { day: 'M/d', hour: 'M/d' };
}

const commonOpts = (yLabel) => ({
  responsive: true,
  maintainAspectRatio: false,
  animation: false,
  interaction: { mode: 'index', intersect: false },
  scales: {
    x: { type: 'time', time: { tooltipFormat: 'yyyy/MM/dd HH:mm:ss', displayFormats: timeDisplayFormats(currentRangeHours) }, ticks: { maxTicksLimit: 6, font: { size: 10 } } },
    y: { title: { display: true, text: yLabel, font: { size: 10 } }, ticks: { font: { size: 10 } } }
  },
  plugins: { legend: { labels: { font: { size: 11 }, boxWidth: 12 } } },
  elements: { point: { radius: 0 }, line: { borderWidth: 1.5 } }
});

const mkDataset = (label, color, yAxisID) => ({ label, borderColor: color, backgroundColor: color + '20', data: [], fill: false, yAxisID });

// --- グラフ初期化 ---
const chartTH = new Chart(document.getElementById('chartTempHum'), {
  type: 'line',
  data: { datasets: [
    mkDataset('気温 (°C)', '#e53935', 'y'),
    mkDataset('湿度 (%)', '#1e88e5', 'y1'),
  ]},
  options: {
    ...commonOpts('°C'),
    scales: {
      ...commonOpts('°C').scales,
      y1: { position: 'right', title: { display: true, text: '%', font: { size: 10 } }, ticks: { font: { size: 10 } }, grid: { drawOnChartArea: false } }
    }
  }
});

const chartRain = new Chart(document.getElementById('chartRain'), {
  type: 'line',
  data: { datasets: [
    { ...mkDataset('雨量 (mm/h)', '#00897b', 'y'), fill: true },
  ]},
  options: commonOpts('mm/h')
});

const chartWind = new Chart(document.getElementById('chartWind'), {
  type: 'line',
  data: { datasets: [
    mkDataset('平均 (m/s)', '#43a047', 'y'),
    mkDataset('瞬間最大 (m/s)', '#fb8c00', 'y'),
  ]},
  options: commonOpts('m/s')
});

const chartLight = new Chart(document.getElementById('chartLight'), {
  type: 'line',
  data: { datasets: [
    mkDataset('照度 (lux)', '#fdd835', 'y'),
    mkDataset('UV指数', '#8e24aa', 'y1'),
  ]},
  options: {
    ...commonOpts('lux'),
    scales: {
      ...commonOpts('lux').scales,
      y1: { position: 'right', title: { display: true, text: 'UV', font: { size: 10 } }, ticks: { font: { size: 10 } }, grid: { drawOnChartArea: false } }
    }
  }
});

allCharts.push(chartTH, chartRain, chartWind, chartLight);

// --- データ操作 ---
function clearCharts() {
  allCharts.forEach(c => c.data.datasets.forEach(ds => { ds.data = []; }));
}

function pushPoint(r) {
  const t = ts(r.recorded_at);
  chartTH.data.datasets[0].data.push({ x: t, y: r.temperature });
  chartTH.data.datasets[1].data.push({ x: t, y: r.humidity });
  chartRain.data.datasets[0].data.push({ x: t, y: r.rainfall_rate });
  chartWind.data.datasets[0].data.push({ x: t, y: r.wind_avg });
  chartWind.data.datasets[1].data.push({ x: t, y: r.wind_gust });
  chartLight.data.datasets[0].data.push({ x: t, y: r.illuminance });
  chartLight.data.datasets[1].data.push({ x: t, y: r.uv_index });
}

function updateTimeFormats(hours) {
  const df = timeDisplayFormats(hours);
  allCharts.forEach(c => { c.options.scales.x.time.displayFormats = df; });
}

function updateCharts() {
  allCharts.forEach(c => c.update());
}

// --- データ取得 ---
function loadData(hours) {
  currentRangeHours = hours;
  const since = Date.now() / 1000 - hours * 3600;
  clearCharts();
  updateTimeFormats(hours);
  fetch(`/api/weather/latest?since=${since}&max_points=600`)
    .then(r => r.json())
    .then(data => {
      if (!data.length) return;
      data.forEach(pushPoint);
      updateCurrent(data[data.length - 1]);
      updateCharts();
    });
}

// --- 範囲切替ボタン ---
document.getElementById('rangeBar').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  document.querySelectorAll('#rangeBar button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadData(parseInt(btn.dataset.hours));
});

// --- 初期データ読み込み ---
loadData(currentRangeHours);

// --- SSE リアルタイム更新 ---
const dot = document.getElementById('statusDot');

function connectSSE() {
  const es = new EventSource('/api/weather/stream');
  es.addEventListener('weather', e => {
    const r = JSON.parse(e.data);
    // 現在値は常に更新
    updateCurrent(r);
    // 選択範囲内のデータならグラフにも追加
    const since = Date.now() / 1000 - currentRangeHours * 3600;
    if (r.recorded_at >= since) {
      pushPoint(r);
      // 古いポイントをトリミング（600件上限）
      allCharts.forEach(c => {
        c.data.datasets.forEach(ds => { if (ds.data.length > 600) ds.data.shift(); });
      });
      updateCharts();
    }
  });
  es.onopen = () => { dot.classList.remove('offline'); };
  es.onerror = () => {
    dot.classList.add('offline');
    es.close();
    setTimeout(connectSSE, 5000);
  };
}
connectSSE();
</script>
</body>
</html>
