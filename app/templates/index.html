<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>気象ステーション</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;color:#333}
header{background:#1a73e8;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:8px}
header h1{font-size:1.1rem;font-weight:600}
.status{width:8px;height:8px;border-radius:50%;background:#4caf50;flex-shrink:0}
.status.offline{background:#f44336}
.current{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;padding:12px 16px}
.card{background:#fff;border-radius:8px;padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card .label{font-size:.7rem;color:#888;text-transform:uppercase;letter-spacing:.5px}
.card .value{font-size:1.5rem;font-weight:700;margin-top:2px}
.card .unit{font-size:.8rem;color:#666;font-weight:400}
.range-bar{display:flex;gap:4px;padding:8px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.range-bar button{flex-shrink:0;padding:6px 12px;border:1px solid #ddd;border-radius:16px;background:#fff;font-size:.75rem;color:#555;cursor:pointer;transition:all .15s}
.range-bar button.active{background:#1a73e8;color:#fff;border-color:#1a73e8}
.range-bar button:hover:not(.active){background:#e8f0fe}
.charts{padding:0 16px 16px}
.chart-box{background:#fff;border-radius:8px;padding:12px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.chart-box h2{font-size:.85rem;color:#555;margin-bottom:8px}
canvas{width:100%!important;height:200px!important}
.nav-bar{display:flex;align-items:center;justify-content:center;gap:8px;padding:4px 16px}
.nav-btn{width:28px;height:28px;border:none;background:none;cursor:pointer;color:#555;font-size:0;display:flex;align-items:center;justify-content:center;transition:opacity .15s}
.nav-btn::after{content:'';display:block;width:0;height:0;border-top:7px solid transparent;border-bottom:7px solid transparent}
.nav-btn.back::after{border-right:10px solid #555}
.nav-btn.fwd::after{border-left:10px solid #555}
.nav-btn:disabled{opacity:.2;cursor:default}
.nav-btn:not(:disabled):hover{opacity:.6}
.nav-range{font-size:.8rem;color:#555;min-width:180px;text-align:center}
.time-info{text-align:center;padding:4px;font-size:.7rem;color:#999}
.extremes{padding:0 16px 12px}
.extremes h2{font-size:.85rem;color:#555;margin-bottom:6px}
.ext-table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);font-size:.78rem}
.ext-table th,.ext-table td{padding:5px 8px;text-align:center;border-bottom:1px solid #eee}
.ext-table th{background:#f5f7fa;color:#666;font-weight:600}
.ext-table td:first-child{text-align:left;color:#555;font-weight:500}
.ext-table tr:last-child td{border-bottom:none}
.ext-table .hi{color:#e53935}
.ext-table .lo{color:#1565c0}
</style>
</head>
<body>
<header>
  <div class="status" id="statusDot"></div>
  <h1>気象ステーション</h1>
</header>

<div class="current" id="currentCards">
  <div class="card"><div class="label">気温</div><div class="value" id="cur-temp">--<span class="unit"> °C</span></div></div>
  <div class="card"><div class="label">湿度</div><div class="value" id="cur-hum">--<span class="unit"> %</span></div></div>
  <div class="card"><div class="label">雨量</div><div class="value" id="cur-rain">--<span class="unit"> mm/h</span></div></div>
  <div class="card"><div class="label">風速</div><div class="value" id="cur-wind">--<span class="unit"> m/s</span></div></div>
  <div class="card"><div class="label">風向</div><div class="value" id="cur-dir">--<span class="unit"> °</span></div></div>
  <div class="card"><div class="label">照度</div><div class="value" id="cur-lux">--<span class="unit"> lux</span></div></div>
  <div class="card"><div class="label">UV指数</div><div class="value" id="cur-uv">--</div></div>
</div>

<div class="range-bar" id="rangeBar">
  <button data-hours="6">6時間</button>
  <button data-hours="12">12時間</button>
  <button data-hours="24" class="active">24時間</button>
  <button data-hours="48">48時間</button>
  <button data-hours="72">72時間</button>
  <button data-hours="168">7日間</button>
  <button data-hours="336">14日間</button>
  <button data-hours="744">1ヶ月</button>
</div>

<div class="nav-bar">
  <button class="nav-btn back" id="navBack" aria-label="戻る"></button>
  <span class="nav-range" id="navRange"></span>
  <button class="nav-btn fwd" id="navFwd" aria-label="進む" disabled></button>
</div>
<div class="time-info" id="timeInfo">データなし</div>

<div class="extremes">
  <h2>極値一覧</h2>
  <table class="ext-table" id="extTable">
    <thead><tr><th></th><th id="extH0">今日</th><th id="extH1">昨日</th><th id="extH2">一昨日</th></tr></thead>
    <tbody>
      <tr><td>気温 最高</td><td class="hi" id="e00">--</td><td class="hi" id="e01">--</td><td class="hi" id="e02">--</td></tr>
      <tr><td>気温 最低</td><td class="lo" id="e10">--</td><td class="lo" id="e11">--</td><td class="lo" id="e12">--</td></tr>
      <tr><td>湿度 最高</td><td id="e20">--</td><td id="e21">--</td><td id="e22">--</td></tr>
      <tr><td>湿度 最低</td><td id="e30">--</td><td id="e31">--</td><td id="e32">--</td></tr>
      <tr><td>風速 最大</td><td id="e40">--</td><td id="e41">--</td><td id="e42">--</td></tr>
      <tr><td>照度 最大</td><td id="e50">--</td><td id="e51">--</td><td id="e52">--</td></tr>
      <tr><td>UV 最大</td><td id="e60">--</td><td id="e61">--</td><td id="e62">--</td></tr>
      <tr><td>瞬間雨量 最大</td><td id="e70">--</td><td id="e71">--</td><td id="e72">--</td></tr>
      <tr><td>24時間雨量</td><td id="e80">--</td><td id="e81">--</td><td id="e82">--</td></tr>
    </tbody>
  </table>
</div>

<div class="charts">
  <div class="chart-box"><h2>気温</h2><canvas id="chartTemp"></canvas></div>
  <div class="chart-box"><h2>湿度</h2><canvas id="chartHum"></canvas></div>
  <div class="chart-box"><h2>雨量</h2><canvas id="chartRain"></canvas></div>
  <div class="chart-box"><h2>風速</h2><canvas id="chartWind"></canvas></div>
  <div class="chart-box"><h2>風向</h2><canvas id="chartWindDir"></canvas></div>
  <div class="chart-box"><h2>照度</h2><canvas id="chartLight"></canvas></div>
  <div class="chart-box"><h2>UV指数</h2><canvas id="chartUV"></canvas></div>
</div>

<script>
const ts = v => new Date(v * 1000);
const fmt = v => v != null ? v.toFixed(1) : '--';
const allCharts = [];
let currentRangeHours = 24;
let timeOffset = 0; // ms, 0=現在, 負=過去

// --- 現在値パネル更新 ---
function updateCurrent(r) {
  document.getElementById('cur-temp').innerHTML = fmt(r.temperature) + '<span class="unit"> °C</span>';
  document.getElementById('cur-hum').innerHTML = fmt(r.humidity) + '<span class="unit"> %</span>';
  document.getElementById('cur-rain').innerHTML = fmt(r.rainfall_rate) + '<span class="unit"> mm/h</span>';
  document.getElementById('cur-wind').innerHTML = fmt(r.wind_avg) + '<span class="unit"> m/s</span>';
  document.getElementById('cur-dir').innerHTML = fmt(r.wind_dir) + '<span class="unit"> °</span>';
  document.getElementById('cur-lux').innerHTML = (r.illuminance != null ? Math.round(r.illuminance) : '--') + '<span class="unit"> lux</span>';
  document.getElementById('cur-uv').innerHTML = fmt(r.uv_index);
  document.getElementById('timeInfo').textContent = '最終更新: ' + ts(r.recorded_at).toLocaleString('ja-JP');
}

// =============================================
// 範囲別 時間軸設定テーブル
// unit/step   : グリッド線の間隔
// mStep       : モバイル時のグリッド間隔
// hourLabels  : true=正時のみラベル表示（サブ刻みは縦線のみ）
// labelFmt    : ラベル表示フォーマット
// tipFmt      : ツールチップフォーマット
// =============================================
const RANGE_AXIS = {
  6:   { unit:'hour',  step:1,  mStep:2,  zebraMin:15,   showHourNum:true,  tipFmt:'yyyy/MM/dd HH:mm:ss' },
  12:  { unit:'hour',  step:1,  mStep:2,  zebraMin:15,   showHourNum:true,  tipFmt:'yyyy/MM/dd HH:mm:ss' },
  24:  { unit:'hour',  step:1,  mStep:2,  zebraMin:30,   showHourNum:true,  tipFmt:'yyyy/MM/dd HH:mm:ss' },
  48:  { unit:'hour',  step:3,  mStep:6,  zebraMin:60,   showHourNum:true,  tipFmt:'yyyy/MM/dd HH:mm' },
  72:  { unit:'hour',  step:6,  mStep:12, zebraMin:120,  showHourNum:true,  tipFmt:'yyyy/MM/dd HH:mm' },
  168: { unit:'hour',  step:12, mStep:24, zebraMin:360,  showHourNum:false, labelFmt:'M/d HH:mm', tipFmt:'yyyy/MM/dd HH:mm' },
  336: { unit:'day',   step:1,  mStep:2,  zebraMin:720,  showHourNum:false, labelFmt:'M/d',        tipFmt:'yyyy/MM/dd' },
  744: { unit:'day',   step:2,  mStep:4,  zebraMin:1440, showHourNum:false, labelFmt:'M/d',        tipFmt:'yyyy/MM/dd' },
};

function getAxisCfg(hours) {
  return RANGE_AXIS[hours] || RANGE_AXIS[24];
}

function isMobile() { return window.innerWidth < 500; }

// step(unit単位) → 分に変換
function stepToMin(cfg, step) {
  if (cfg.unit === 'hour') return step * 60;
  if (cfg.unit === 'day')  return step * 1440;
  return step; // minute
}

// ローカル時刻を stepMin 分単位の正時境界に丸める
function alignTime(ms, stepMin, roundUp) {
  const d = new Date(ms);
  if (stepMin >= 1440) {
    // 日単位: 午前0時に揃える
    d.setHours(0, 0, 0, 0);
    if (roundUp && d.getTime() < ms) d.setDate(d.getDate() + 1);
    return d.getTime();
  }
  const dayStart = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
  const elapsed = (ms - dayStart) / 60000;
  const aligned = roundUp
    ? Math.ceil(elapsed / stepMin) * stepMin
    : Math.floor(elapsed / stepMin) * stepMin;
  return dayStart + aligned * 60000;
}

// --- ゼブラ表示プラグイン（ローカル午前0時基準で独立計算） ---
const zebraPlugin = {
  id: 'zebra',
  beforeDatasetsDraw(chart) {
    const { ctx, chartArea } = chart;
    if (!chartArea) return;
    const { top, bottom, left, right } = chartArea;
    const xScale = chart.scales.x;
    if (!xScale) return;
    const cfg = getAxisCfg(currentRangeHours);
    const zMs = cfg.zebraMin * 60000;
    // ローカル午前0時を基準にバンドを計算
    const d = new Date(xScale.min);
    const day0 = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
    let b = Math.floor((xScale.min - day0) / zMs);
    let t = day0 + b * zMs;
    ctx.save();
    while (t < xScale.max) {
      const next = t + zMs;
      if (b % 2 === 0) {
        const x1 = Math.max(xScale.getPixelForValue(t), left);
        const x2 = Math.min(xScale.getPixelForValue(next), right);
        if (x2 > x1) {
          ctx.fillStyle = 'rgba(0, 0, 0, 0.03)';
          ctx.fillRect(x1, top, x2 - x1, bottom - top);
        }
      }
      t = next;
      b++;
    }
    ctx.restore();
  }
};
Chart.register(zebraPlugin);

// --- Chart.js 共通設定 ---
const commonOpts = (yLabel) => ({
  responsive: true,
  maintainAspectRatio: false,
  animation: false,
  interaction: { mode: 'index', intersect: false },
  scales: {
    x: {
      type: 'time',
      time: {
        unit: 'minute',
        stepSize: 30,
        tooltipFormat: 'yyyy/MM/dd HH:mm:ss',
        displayFormats: { minute: 'HH:mm', hour: 'HH:mm', day: 'M/d' }
      },
      ticks: { autoSkip: false, maxRotation: 0, font: { size: 10 } },
      grid: { color: '#e0e0e0' }
    },
    y: { title: { display: true, text: yLabel, font: { size: 10 } }, ticks: { font: { size: 10 } } }
  },
  plugins: { legend: { labels: { font: { size: 11 }, boxWidth: 12 } } },
  elements: { point: { radius: 0 }, line: { borderWidth: 1.5 } }
});

const mkDataset = (label, color, yAxisID) => ({ label, borderColor: color, backgroundColor: color + '20', data: [], fill: false, yAxisID });

// --- Y軸グリッド強調ヘルパー ---
// majorStep 毎に強調線、extraZero=true なら 0 を更に強調
function yGridColor(majorStep, extraZero) {
  return function(ctx) {
    if (!ctx.tick) return '#e0e0e0';
    const v = ctx.tick.value;
    if (extraZero && v === 0) return 'rgba(0,0,200,0.6)';
    if (v % majorStep === 0) return 'rgba(0,0,0,0.3)';
    return '#e0e0e0';
  };
}
function yGridWidth(majorStep, extraZero) {
  return function(ctx) {
    if (!ctx.tick) return 0.5;
    const v = ctx.tick.value;
    if (extraZero && v === 0) return 2;
    if (v % majorStep === 0) return 1.5;
    return 0.5;
  };
}

// --- グラフ初期化 ---
const chartTemp = new Chart(document.getElementById('chartTemp'), {
  type: 'line',
  data: { datasets: [ mkDataset('気温 (°C)', '#e53935', 'y') ]},
  options: {
    ...commonOpts('°C'),
    scales: {
      ...commonOpts('°C').scales,
      y: { ...commonOpts('°C').scales.y, grid: { color: yGridColor(10, true), lineWidth: yGridWidth(10, true) } }
    }
  }
});

const chartHum = new Chart(document.getElementById('chartHum'), {
  type: 'line',
  data: { datasets: [ mkDataset('湿度 (%)', '#1e88e5', 'y') ]},
  options: {
    ...commonOpts('%'),
    scales: {
      ...commonOpts('%').scales,
      y: { ...commonOpts('%').scales.y, grid: { color: yGridColor(10, false), lineWidth: yGridWidth(10, false) } }
    }
  }
});

const chartRain = new Chart(document.getElementById('chartRain'), {
  type: 'line',
  data: { datasets: [
    { ...mkDataset('瞬間 (mm/h)', '#00897b', 'y'), fill: true },
    mkDataset('積算 (mm)', '#1565c0', 'y'),
  ]},
  options: {
    ...commonOpts('mm'),
    scales: {
      ...commonOpts('mm').scales,
      y: { ...commonOpts('mm').scales.y, min: 0, suggestedMax: 5, grid: { color: yGridColor(10, false), lineWidth: yGridWidth(10, false) } }
    }
  }
});

const chartWind = new Chart(document.getElementById('chartWind'), {
  type: 'line',
  data: { datasets: [
    mkDataset('平均 (m/s)', '#43a047', 'y'),
    mkDataset('瞬間最大 (m/s)', '#fb8c00', 'y'),
  ]},
  options: commonOpts('m/s')
});

const chartLight = new Chart(document.getElementById('chartLight'), {
  type: 'line',
  data: { datasets: [
    mkDataset('照度 (lux)', '#fdd835', 'y'),
  ]},
  options: commonOpts('lux')
});

const chartUV = new Chart(document.getElementById('chartUV'), {
  type: 'line',
  data: { datasets: [
    mkDataset('UV指数', '#8e24aa', 'y'),
  ]},
  options: {
    ...commonOpts('UV'),
    scales: {
      ...commonOpts('UV').scales,
      y: { ...commonOpts('UV').scales.y, grid: { color: yGridColor(1, false), lineWidth: yGridWidth(1, false) } }
    }
  }
});

const chartWindDir = new Chart(document.getElementById('chartWindDir'), {
  type: 'scatter',
  data: { datasets: [
    {
      label: '風向',
      borderColor: '#5c6bc0',
      backgroundColor: '#5c6bc0',
      data: [],
      pointRadius: 2,
      pointHoverRadius: 4,
      order: 2,
    },
    {
      label: '傾向',
      type: 'line',
      borderColor: 'rgba(255,87,34,0.7)',
      backgroundColor: 'transparent',
      data: [],
      pointRadius: 0,
      borderWidth: 2,
      tension: 0.3,
      fill: false,
      order: 1,
    }
  ]},
  options: {
    ...commonOpts(''),
    interaction: { mode: 'nearest', intersect: false },
    scales: {
      ...commonOpts('').scales,
      y: {
        min: 0, max: 360,
        ticks: {
          stepSize: 90,
          callback: v => ({0:'N',90:'E',180:'S',270:'W',360:'N'})[v] || '',
          font: { size: 10 }
        },
        grid: { color: '#e0e0e0' }
      }
    },
    elements: { point: { radius: 2 } }
  }
});

allCharts.push(chartTemp, chartHum, chartRain, chartWind, chartWindDir, chartLight, chartUV);

// --- 時間軸を範囲に合わせて再設定 ---
function applyTimeAxis(hours) {
  const cfg = getAxisCfg(hours);
  const step = isMobile() ? cfg.mStep : cfg.step;
  const sMin = stepToMin(cfg, step);

  const end = Date.now() + timeOffset;
  const axisMax = alignTime(end, sMin, true);
  const axisMin = alignTime(end - hours * 3600000, sMin, false);

  const fmtObj = cfg.showHourNum
    ? { minute: 'HH:mm', hour: 'HH:mm', day: 'M/d' }
    : { minute: cfg.labelFmt, hour: cfg.labelFmt, day: cfg.labelFmt };

  const tickCb = cfg.showHourNum
    ? function(value) { return String(new Date(value).getHours()); }
    : null;

  allCharts.forEach(c => {
    const x = c.options.scales.x;
    x.min = axisMin;
    x.max = axisMax;
    x.time.unit = cfg.unit;
    x.time.stepSize = step;
    x.ticks.stepSize = step;
    x.time.tooltipFormat = cfg.tipFmt;
    x.time.displayFormats = fmtObj;
    x.ticks.callback = tickCb;
    x.grid.color = '#bbb';
  });
}

// --- データ操作 ---
let rainAccum = 0;
let rainLastDay = -1;

function clearCharts() {
  allCharts.forEach(c => c.data.datasets.forEach(ds => { ds.data = []; }));
  rainAccum = 0;
  rainLastDay = -1;
}

function pushPoint(r) {
  const t = ts(r.recorded_at);
  // 24時間積算雨量（日付変更でリセット）
  const day = t.getDate();
  if (rainLastDay !== -1 && day !== rainLastDay) rainAccum = 0;
  rainLastDay = day;
  if (r.rainfall_delta != null) rainAccum += r.rainfall_delta;

  chartTemp.data.datasets[0].data.push({ x: t, y: r.temperature });
  chartHum.data.datasets[0].data.push({ x: t, y: r.humidity });
  chartRain.data.datasets[0].data.push({ x: t, y: r.rainfall_rate });
  chartRain.data.datasets[1].data.push({ x: t, y: rainAccum });
  chartWind.data.datasets[0].data.push({ x: t, y: r.wind_avg });
  chartWind.data.datasets[1].data.push({ x: t, y: r.wind_gust });
  if (r.wind_dir != null) chartWindDir.data.datasets[0].data.push({ x: t, y: r.wind_dir });
  chartLight.data.datasets[0].data.push({ x: t, y: r.illuminance });
  chartUV.data.datasets[0].data.push({ x: t, y: r.uv_index });
}

// --- 風向トレンドライン（ベクトル移動平均） ---
function updateWindDirTrend() {
  const raw = chartWindDir.data.datasets[0].data;
  if (raw.length < 5) { chartWindDir.data.datasets[1].data = []; return; }
  const win = Math.max(5, Math.floor(raw.length / 30));
  const trend = [];
  for (let i = 0; i < raw.length; i++) {
    let sinSum = 0, cosSum = 0, n = 0;
    const lo = Math.max(0, i - win), hi = Math.min(raw.length - 1, i + win);
    for (let j = lo; j <= hi; j++) {
      const rad = raw[j].y * Math.PI / 180;
      sinSum += Math.sin(rad);
      cosSum += Math.cos(rad);
      n++;
    }
    let avg = Math.atan2(sinSum / n, cosSum / n) * 180 / Math.PI;
    if (avg < 0) avg += 360;
    trend.push({ x: raw[i].x, y: avg });
  }
  chartWindDir.data.datasets[1].data = trend;
}

function updateCharts() {
  updateWindDirTrend();
  allCharts.forEach(c => c.update());
}

// --- ナビゲーション ---
function navFmtDate(ms) {
  const d = new Date(ms);
  const M = d.getMonth() + 1, D = d.getDate();
  const h = d.getHours(), m = String(d.getMinutes()).padStart(2, '0');
  return `${M}/${D} ${h}:${m}`;
}

function updateNav() {
  const end = Date.now() + timeOffset;
  const start = end - currentRangeHours * 3600000;
  document.getElementById('navRange').textContent = `${navFmtDate(start)} — ${navFmtDate(end)}`;
  document.getElementById('navFwd').disabled = (timeOffset >= 0);
}

document.getElementById('navBack').addEventListener('click', () => {
  timeOffset -= currentRangeHours * 3600000;
  loadData(currentRangeHours);
});

document.getElementById('navFwd').addEventListener('click', () => {
  timeOffset += currentRangeHours * 3600000;
  if (timeOffset > 0) timeOffset = 0;
  loadData(currentRangeHours);
});

// --- データ取得 ---
function loadData(hours) {
  currentRangeHours = hours;
  const endSec = Date.now() / 1000 + timeOffset / 1000;
  const since = endSec - hours * 3600;
  clearCharts();
  applyTimeAxis(hours);

  let url = `/api/weather/latest?since=${since}&max_points=600`;
  if (timeOffset < 0) url += `&until=${endSec}`;

  fetch(url)
    .then(r => r.json())
    .then(data => {
      if (data.length) {
        data.forEach(pushPoint);
        updateCurrent(data[data.length - 1]);
      }
      updateCharts();
      updateNav();
    });
}

// --- 範囲切替ボタン ---
document.getElementById('rangeBar').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  document.querySelectorAll('#rangeBar button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  timeOffset = 0;
  loadData(parseInt(btn.dataset.hours));
});

// --- レスポンシブ: 画面幅変更時に軸を再計算 ---
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    applyTimeAxis(currentRangeHours);
    updateCharts();
  }, 300);
});

// --- 初期データ読み込み ---
loadData(currentRangeHours);

// --- SSE リアルタイム更新 ---
const dot = document.getElementById('statusDot');

function connectSSE() {
  const es = new EventSource('/api/weather/stream');
  es.addEventListener('weather', e => {
    const r = JSON.parse(e.data);
    updateCurrent(r);
    // 過去表示中はグラフ更新しない
    if (timeOffset < 0) return;
    // 軸ウィンドウをスライド
    const cfg = getAxisCfg(currentRangeHours);
    const step = isMobile() ? cfg.mStep : cfg.step;
    const sMin = stepToMin(cfg, step);
    const now = Date.now();
    const axisMax = alignTime(now, sMin, true);
    const axisMin = alignTime(now - currentRangeHours * 3600000, sMin, false);
    allCharts.forEach(c => {
      const x = c.options.scales.x;
      x.min = axisMin;
      x.max = axisMax;
    });
    // 範囲内ならグラフに追加
    if (r.recorded_at * 1000 >= axisMin) {
      pushPoint(r);
      allCharts.forEach(c => {
        c.data.datasets.forEach(ds => { if (ds.data.length > 600) ds.data.shift(); });
      });
    }
    updateCharts();
    updateNav();
  });
  es.onopen = () => { dot.classList.remove('offline'); };
  es.onerror = () => {
    dot.classList.add('offline');
    es.close();
    setTimeout(connectSSE, 5000);
  };
}
connectSSE();

// --- 極値テーブル ---
function loadExtremes() {
  const tzOff = -new Date().getTimezoneOffset(); // 分 (JST=540)
  fetch(`/api/weather/extremes?days=3&tz_offset=${tzOff}`)
    .then(r => r.json())
    .then(data => {
      // data は day_num 降順（今日, 昨日, 一昨日）
      const now = new Date();
      const todayNum = Math.floor((now.getTime() / 1000 + tzOff * 60) / 86400);
      const rows = [
        ['temp_max',     v => v != null ? v.toFixed(1) + ' °C' : '--'],
        ['temp_min',     v => v != null ? v.toFixed(1) + ' °C' : '--'],
        ['hum_max',      v => v != null ? v.toFixed(1) + ' %' : '--'],
        ['hum_min',      v => v != null ? v.toFixed(1) + ' %' : '--'],
        ['wind_max',     v => v != null ? v.toFixed(1) + ' m/s' : '--'],
        ['lux_max',      v => v != null ? Math.round(v) + ' lux' : '--'],
        ['uv_max',       v => v != null ? v.toFixed(1) : '--'],
        ['rain_rate_max',v => v != null ? v.toFixed(1) + ' mm/h' : '--'],
        ['rain_24h',     v => v != null ? v.toFixed(1) + ' mm' : '--'],
      ];
      // day_num → column index (0=今日, 1=昨日, 2=一昨日)
      const byCol = {};
      data.forEach(d => {
        const col = todayNum - d.day_num;
        if (col >= 0 && col < 3) byCol[col] = d;
      });
      // ヘッダー日付更新
      for (let c = 0; c < 3; c++) {
        const dt = new Date((todayNum - c) * 86400 * 1000 - tzOff * 60000);
        const label = c === 0 ? '今日' : c === 1 ? '昨日' : '一昨日';
        document.getElementById('extH' + c).textContent = `${label} (${dt.getMonth()+1}/${dt.getDate()})`;
      }
      rows.forEach(([ key, fmtFn ], ri) => {
        for (let ci = 0; ci < 3; ci++) {
          const el = document.getElementById('e' + ri + ci);
          const d = byCol[ci];
          el.textContent = d ? fmtFn(d[key]) : '--';
        }
      });
    });
}
loadExtremes();
// 5分ごとに更新
setInterval(loadExtremes, 300000);
</script>
