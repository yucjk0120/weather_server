<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>気象ステーション</title>
<link rel="icon" type="image/png" sizes="48x48" href="/static/icons/favicon-48.png">
<link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32.png">
<link rel="icon" type="image/x-icon" href="/static/icons/favicon.ico">
<!-- PWA -->
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
<meta name="theme-color" content="#006A6A" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1B2122" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="気象ステーション">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
/* ============================================================
   MD3 Expressive — Design Tokens (Weather Teal Theme)
   ============================================================ */
:root {
  /* Color roles */
  --md-sys-color-primary: #006874;
  --md-sys-color-on-primary: #ffffff;
  --md-sys-color-primary-container: #97F0FF;
  --md-sys-color-on-primary-container: #001F24;
  --md-sys-color-secondary: #4A6267;
  --md-sys-color-on-secondary: #ffffff;
  --md-sys-color-secondary-container: #CDE7EC;
  --md-sys-color-on-secondary-container: #051F23;
  --md-sys-color-tertiary: #7E5700;
  --md-sys-color-tertiary-container: #FFDdb2;
  --md-sys-color-on-tertiary-container: #271900;
  --md-sys-color-error: #BA1A1A;
  --md-sys-color-error-container: #FFDAD6;
  --md-sys-color-background: #F4FAFB;
  --md-sys-color-on-background: #171D1E;
  --md-sys-color-surface: #F4FAFB;
  --md-sys-color-on-surface: #171D1E;
  --md-sys-color-surface-variant: #DBE4E6;
  --md-sys-color-on-surface-variant: #3F4849;
  --md-sys-color-surface-container-lowest: #ffffff;
  --md-sys-color-surface-container-low: #EEF7F9;
  --md-sys-color-surface-container: #E8F1F3;
  --md-sys-color-surface-container-high: #E2ECF0;
  --md-sys-color-surface-container-highest: #DCE6E8;
  --md-sys-color-outline: #6F797A;
  --md-sys-color-outline-variant: #BFC8CA;
  --md-sys-color-inverse-surface: #2B3133;
  --md-sys-color-inverse-on-surface: #ECF2F3;
  --md-sys-color-inverse-primary: #4DD8E8;
  /* Shape */
  --md-sys-shape-xs: 4px;
  --md-sys-shape-sm: 8px;
  --md-sys-shape-md: 12px;
  --md-sys-shape-lg: 16px;
  --md-sys-shape-xl: 28px;
  --md-sys-shape-full: 9999px;
  /* Elevation */
  --md-elev-1: 0 1px 2px rgba(0,0,0,.1), 0 1px 3px rgba(0,0,0,.07);
  --md-elev-2: 0 1px 2px rgba(0,0,0,.1), 0 2px 6px rgba(0,0,0,.08);
  --md-elev-3: 0 4px 8px rgba(0,0,0,.09), 0 1px 3px rgba(0,0,0,.07);
  /* Spring easing (M3 Expressive) */
  --md-spring: cubic-bezier(0.34, 1.4, 0.64, 1);
  --md-spring-fast: cubic-bezier(0.34, 1.6, 0.64, 1);
}

/* ============================================================
   MD3 Dark Theme (system preference)
   ============================================================ */
@media (prefers-color-scheme: dark) {
  :root {
    --md-sys-color-primary: #4DD8E8;
    --md-sys-color-on-primary: #00363D;
    --md-sys-color-primary-container: #004F58;
    --md-sys-color-on-primary-container: #97F0FF;
    --md-sys-color-secondary: #B1CBD0;
    --md-sys-color-on-secondary: #1C3438;
    --md-sys-color-secondary-container: #334B4F;
    --md-sys-color-on-secondary-container: #CDE7EC;
    --md-sys-color-tertiary: #F0BF48;
    --md-sys-color-tertiary-container: #5C4200;
    --md-sys-color-on-tertiary-container: #FFDdb2;
    --md-sys-color-error: #FFB4AB;
    --md-sys-color-error-container: #93000A;
    --md-sys-color-background: #0E1415;
    --md-sys-color-on-background: #DCE6E8;
    --md-sys-color-surface: #0E1415;
    --md-sys-color-on-surface: #DCE6E8;
    --md-sys-color-surface-variant: #3F4849;
    --md-sys-color-on-surface-variant: #BFC8CA;
    --md-sys-color-surface-container-lowest: #111819;
    --md-sys-color-surface-container-low: #171D1E;
    --md-sys-color-surface-container: #1B2122;
    --md-sys-color-surface-container-high: #252B2C;
    --md-sys-color-surface-container-highest: #303637;
    --md-sys-color-outline: #899393;
    --md-sys-color-outline-variant: #3F4849;
    --md-sys-color-inverse-surface: #DCE6E8;
    --md-sys-color-inverse-on-surface: #2B3133;
    --md-sys-color-inverse-primary: #006874;
    --md-elev-1: 0 1px 3px rgba(0,0,0,.5), 0 1px 2px rgba(0,0,0,.4);
    --md-elev-2: 0 2px 6px rgba(0,0,0,.5), 0 1px 2px rgba(0,0,0,.4);
    --md-elev-3: 0 4px 8px rgba(0,0,0,.5), 0 1px 3px rgba(0,0,0,.4);
  }
  /* Extremes table */
  .ext-table .hi { color: #FF8A80; }
  .ext-table .lo { color: #82B1FF; }
  /* Inline style overrides */
  #cur-feels { color: var(--md-sys-color-on-surface-variant) !important; }
  /* Wind compass SVG */
  .wind-compass circle { stroke: var(--md-sys-color-outline-variant); }
  .wind-compass > svg > text { fill: var(--md-sys-color-outline); }
  .wind-center { fill: var(--md-sys-color-on-surface) !important; }
  /* Rain cylinder SVG */
  .rain-cylinder ellipse { stroke: #444; }
  .rain-cylinder ellipse[fill="#e8e8e8"] { fill: #252B2C; }
  .rain-cylinder ellipse[fill="#f5f5f5"] { fill: #1B2122; }
  .rain-cylinder rect[fill="#f0f0f0"] { fill: #1B2122; }
  .rain-cylinder line { stroke: #444; }
  #rain-cyl-text { fill: #82B1FF; }
  .rain-cylinder text[fill="#888"] { fill: #899393; }
  /* Thermometer SVG */
  svg rect[fill="#eee"] { fill: #303637; }
  svg rect[fill="#eee"][stroke="#bbb"],
  svg circle[stroke="#bbb"] { stroke: #555; }
  /* Person/feels icon */
  svg circle[fill="#bbb"], svg path[fill="#bbb"] { fill: #666; }
}

/* === Base === */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--md-sys-color-background);
  color: var(--md-sys-color-on-surface);
  -webkit-font-smoothing: antialiased;
}

/* === Top App Bar (MD3 Small) === */
header {
  background: var(--md-sys-color-surface-container);
  color: var(--md-sys-color-on-surface);
  padding: 0 4px 0 16px;
  height: 64px;
  display: flex;
  align-items: center;
  gap: 8px;
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: var(--md-elev-1);
}
header h1 { font-size: 1.375rem; font-weight: 400; letter-spacing: 0; flex: 1; }
.status { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; flex-shrink: 0; }
.status.offline { background: #ba1a1a; }

/* === Compact Dashboard Card === */
.current { padding: 12px 16px; }
.dash {
  background: var(--md-sys-color-surface-container-lowest);
  border-radius: var(--md-sys-shape-xl);
  padding: 12px 16px;
  box-shadow: var(--md-elev-1);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  flex-wrap: wrap;
}
.dash-item { display: flex; align-items: center; gap: 4px; padding: 4px 6px; }
.dash-sep { width: 1px; height: 32px; background: var(--md-sys-color-outline-variant); flex-shrink: 0; }
.dash-val { font-size: 1.15rem; font-weight: 500; transition: color .3s; white-space: nowrap; }
.dash-unit { font-size: .65rem; color: var(--md-sys-color-on-surface-variant); font-weight: 400; }
.dash-sub { font-size: .6rem; color: var(--md-sys-color-on-surface-variant); margin-left: 2px; }

/* === Wind Compass === */
.wind-compass { width: 56px; height: 56px; flex-shrink: 0; }
.wind-compass svg { width: 100%; height: 100%; }
.wind-center { font-size: 10px; font-weight: 500; fill: var(--md-sys-color-on-surface); }
.wind-arrow { transition: transform .5s var(--md-spring); }

/* === Rain Cylinder === */
.rain-cylinder { width: 36px; height: 54px; flex-shrink: 0; }
.rain-cylinder svg { width: 100%; height: 100%; }

/* === Range Bar === */
.range-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.range-bar::-webkit-scrollbar { display: none; }

/* === Navigation Bar === */
.nav-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 4px 16px;
}
.nav-range {
  font-size: .85rem;
  color: var(--md-sys-color-on-surface-variant);
  min-width: 190px;
  text-align: center;
  font-weight: 400;
}
.time-info {
  text-align: center;
  padding: 2px 4px 8px;
  font-size: .7rem;
  color: var(--md-sys-color-on-surface-variant);
}

/* === Chart Grid === */
.charts { display: grid; grid-template-columns: 1fr; gap: 12px; padding: 0 16px 24px; }
@media (min-width: 900px) { .charts { grid-template-columns: repeat(2, 1fr); } }

/* MD3 Filled Card */
.chart-box {
  background: var(--md-sys-color-surface-container-lowest);
  border-radius: var(--md-sys-shape-lg);
  padding: 16px;
  box-shadow: var(--md-elev-1);
  min-width: 0;
  transition: box-shadow .25s var(--md-spring);
}
.chart-box:hover { box-shadow: var(--md-elev-2); }
.chart-box h2 {
  font-size: .875rem;
  font-weight: 500;
  color: var(--md-sys-color-on-surface-variant);
  margin-bottom: 10px;
  letter-spacing: .1px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.chart-wrap { position: relative; height: 300px; }

/* === Extremes Table === */
.ext-table { width: 100%; border-collapse: collapse; font-size: .78rem; }
.ext-table th, .ext-table td { padding: 6px 8px; text-align: center; border-bottom: 1px solid var(--md-sys-color-outline-variant); }
.ext-table th { background: var(--md-sys-color-surface-container); color: var(--md-sys-color-on-surface-variant); font-weight: 500; }
.ext-table td:first-child { text-align: left; color: var(--md-sys-color-on-surface-variant); font-weight: 500; }
.ext-table tr:last-child td { border-bottom: none; }
.ext-table .hi { color: #C00010; }
.ext-table .lo { color: #0061A4; }

/* === Icon Button (MD3 Standard) === */
.icon-btn {
  width: 40px;
  height: 40px;
  border-radius: var(--md-sys-shape-full);
  border: none;
  background: transparent;
  color: var(--md-sys-color-on-surface-variant);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background .15s;
  -webkit-tap-highlight-color: transparent;
}
.icon-btn:hover { background: color-mix(in srgb, var(--md-sys-color-on-surface-variant) 8%, transparent); }
.icon-btn:active { background: color-mix(in srgb, var(--md-sys-color-on-surface-variant) 12%, transparent); }
.icon-btn:disabled { opacity: .38; cursor: default; }
.icon-btn:disabled:hover { background: transparent; }
.icon-btn .material-symbols-outlined { font-size: 24px; }

/* === Toggle Switch (MD3) === */
.toggle-switch {
  position: relative;
  width: 44px;
  height: 24px;
  appearance: none;
  -webkit-appearance: none;
  background: var(--md-sys-color-surface-variant);
  border: 2px solid var(--md-sys-color-outline);
  border-radius: 12px;
  cursor: pointer;
  flex-shrink: 0;
  transition: background .2s, border-color .2s;
}
.toggle-switch::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 3px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--md-sys-color-outline);
  transition: transform .25s var(--md-spring-fast), background .2s, width .15s, height .15s;
}
.toggle-switch:checked {
  background: var(--md-sys-color-primary);
  border-color: var(--md-sys-color-primary);
}
.toggle-switch:checked::after {
  transform: translateX(20px);
  background: var(--md-sys-color-on-primary);
  width: 14px;
  height: 14px;
}

/* === Range / Snap Chip buttons (MD3 Filter Chip style) === */
.range-chip {
  height: 32px;
  padding: 0 12px;
  border-radius: var(--md-sys-shape-sm);
  border: 1px solid var(--md-sys-color-outline-variant);
  background: transparent;
  color: var(--md-sys-color-on-surface-variant);
  font-family: 'Roboto', sans-serif;
  font-size: .8rem;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  transition: background .15s, color .15s, border-color .15s var(--md-spring-fast);
  -webkit-tap-highlight-color: transparent;
}
.range-chip:hover {
  background: color-mix(in srgb, var(--md-sys-color-on-surface-variant) 8%, transparent);
}
.range-chip.selected {
  background: var(--md-sys-color-primary);
  color: var(--md-sys-color-on-primary);
  border-color: var(--md-sys-color-primary);
}
.range-chip.selected::before {
  content: 'check';
  font-family: 'Material Symbols Outlined';
  font-size: 16px;
  line-height: 1;
}
#snapToggle.selected {
  background: var(--md-sys-color-tertiary);
  border-color: var(--md-sys-color-tertiary);
  color: #ffffff;
}

/* === Data Table Overlay === */
.tbl-btn {
  width: 28px; height: 28px; border-radius: var(--md-sys-shape-full);
  border: none; background: transparent; color: var(--md-sys-color-on-surface-variant);
  cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
  margin-left: auto; flex-shrink: 0; transition: background .15s;
}
.tbl-btn:hover { background: color-mix(in srgb, var(--md-sys-color-on-surface-variant) 8%, transparent); }
.tbl-btn .material-symbols-outlined { font-size: 18px; }
.data-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,.45);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; visibility: hidden;
  transition: opacity .2s, visibility .2s;
}
.data-overlay.open { opacity: 1; visibility: visible; }
.data-modal {
  background: var(--md-sys-color-surface-container-low);
  border-radius: var(--md-sys-shape-xl);
  box-shadow: var(--md-elev-3);
  width: min(92vw, 720px);
  max-height: 80vh;
  display: flex; flex-direction: column;
  overflow: hidden;
  animation: modalIn .25s var(--md-spring);
}
@keyframes modalIn { from { transform: scale(.92); opacity: 0; } }
.data-modal-head {
  display: flex; align-items: center; padding: 16px 16px 12px;
  gap: 12px; flex-shrink: 0;
}
.data-modal-head h3 {
  flex: 1; font-size: 1.1rem; font-weight: 500;
  color: var(--md-sys-color-on-surface);
}
.data-modal-body { overflow: auto; padding: 0 16px 16px; flex: 1; }
.data-tbl {
  width: 100%; border-collapse: collapse; font-size: .75rem;
  font-variant-numeric: tabular-nums;
}
.data-tbl th {
  position: sticky; top: 0; z-index: 1;
  background: var(--md-sys-color-surface-container);
  color: var(--md-sys-color-on-surface-variant);
  font-weight: 500; text-align: right; padding: 6px 10px;
  border-bottom: 1px solid var(--md-sys-color-outline-variant);
}
.data-tbl th:first-child { text-align: left; }
.data-tbl td {
  padding: 4px 10px; text-align: right;
  border-bottom: 1px solid var(--md-sys-color-outline-variant);
  color: var(--md-sys-color-on-surface);
}
.data-tbl td:first-child {
  text-align: left; color: var(--md-sys-color-on-surface-variant);
  white-space: nowrap;
}
.data-tbl tbody tr:hover { background: color-mix(in srgb, var(--md-sys-color-primary) 6%, transparent); }
</style>
</head>
<body>
<header>
  <div class="status" id="statusDot"></div>
  <h1>気象ステーション</h1>
</header>

<div class="current">
<div class="dash" id="currentCards">
  <!-- 気温: 温度計+数値+体感温度 -->
  <div class="dash-item" style="flex-direction:column;align-items:flex-start;gap:2px">
    <div style="display:flex;align-items:center;gap:3px">
      <svg viewBox="0 0 24 40" width="20" height="34"><rect x="9" y="2" width="6" height="26" rx="3" fill="#eee" stroke="#bbb" stroke-width="1"/><rect id="thermo-fill" x="10" y="18" width="4" height="10" rx="2" fill="#e53935"/><circle cx="12" cy="32" r="5" fill="#e53935" stroke="#bbb" stroke-width="1"/></svg>
      <span class="dash-val" id="cur-temp">--</span><span class="dash-unit">°C</span>
    </div>
    <div style="display:flex;align-items:center;gap:3px;padding-left:1px">
      <svg viewBox="0 0 14 20" width="11" height="16"><circle cx="7" cy="4" r="3" fill="#bbb"/><path d="M3 20 Q3 12 7 10 Q11 12 11 20Z" fill="#bbb"/></svg>
      <span id="cur-feels" style="font-size:.85rem;color:#666">--</span><span class="dash-unit">°C</span>
    </div>
  </div>
  <div class="dash-sep"></div>
  <!-- 湿度: 水滴+数値 -->
  <div class="dash-item">
    <svg viewBox="0 0 32 40" width="16" height="22"><path d="M16 4 C16 4 6 18 6 26 a10 10 0 0 0 20 0 C26 18 16 4 16 4Z" fill="#bbdefb" stroke="#64b5f6" stroke-width="1.2" id="hum-drop"/></svg>
    <span class="dash-val" id="cur-hum">--</span><span class="dash-unit">%</span>
  </div>
  <div class="dash-sep"></div>
  <!-- 雨量: 円柱ゲージ(24h) + 瞬間雨量 -->
  <div class="dash-item">
    <div class="rain-cylinder">
      <svg viewBox="0 0 50 80">
        <defs><clipPath id="cylClip"><rect x="9" y="12" width="32" height="56"/></clipPath><linearGradient id="rainGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#64b5f6"/><stop offset="100%" stop-color="#1565c0"/></linearGradient></defs>
        <ellipse cx="25" cy="68" rx="16" ry="5" fill="#e8e8e8" stroke="#ccc" stroke-width="0.8"/>
        <rect x="9" y="12" width="32" height="56" fill="#f0f0f0"/>
        <line x1="9" y1="12" x2="9" y2="68" stroke="#ccc" stroke-width="0.8"/>
        <line x1="41" y1="12" x2="41" y2="68" stroke="#ccc" stroke-width="0.8"/>
        <line x1="6" y1="26" x2="9" y2="26" stroke="#aaa" stroke-width="0.6"/>
        <line x1="6" y1="40" x2="9" y2="40" stroke="#aaa" stroke-width="0.6"/>
        <line x1="6" y1="54" x2="9" y2="54" stroke="#aaa" stroke-width="0.6"/>
        <rect id="rain-cyl-fill" x="9" y="68" width="32" height="0" fill="url(#rainGrad)" clip-path="url(#cylClip)"/>
        <ellipse id="rain-cyl-surface" cx="25" cy="68" rx="16" ry="5" fill="#42a5f5" opacity="0.7" visibility="hidden"/>
        <ellipse cx="25" cy="12" rx="16" ry="5" fill="#f5f5f5" stroke="#ccc" stroke-width="0.8"/>
        <text id="rain-cyl-text" x="25" y="44" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">0.0</text>
        <text x="25" y="54" text-anchor="middle" font-size="6.5" fill="#888">mm</text>
      </svg>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-start;line-height:1.2">
      <span class="dash-val" id="cur-rain" style="font-size:.95rem">--</span><span class="dash-unit">mm/h</span>
    </div>
  </div>
  <div class="dash-sep"></div>
  <!-- 風向風速: コンパス -->
  <div class="dash-item">
    <div class="wind-compass">
      <svg viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="36" fill="none" stroke="#ddd" stroke-width="1.5"/>
        <text x="40" y="10" text-anchor="middle" font-size="8" fill="#999">N</text>
        <text x="72" y="43" text-anchor="middle" font-size="8" fill="#999">E</text>
        <text x="40" y="76" text-anchor="middle" font-size="8" fill="#999">S</text>
        <text x="8" y="43" text-anchor="middle" font-size="8" fill="#999">W</text>
        <g id="wind-arrow" class="wind-arrow" transform="translate(40,40) rotate(0)">
          <path d="M-6 24 L-6 -7 L-14 -7 L0 -26 L14 -7 L6 -7 L6 24 Z" fill="rgba(69,90,100,0.5)"/>
        </g>
        <text id="wind-spd-txt" class="wind-center" x="40" y="44" text-anchor="middle">--</text>
      </svg>
    </div>
  </div>

<script>
const ts = v => new Date(v * 1000);
const fmt = v => v != null ? v.toFixed(1) : '--';
const allCharts = [];
const darkMQ = window.matchMedia('(prefers-color-scheme: dark)');
let isDark = darkMQ.matches;
let currentRangeHours = 24;
let timeOffset = 0; // ms, 0=現在, 負=過去
let snapToZero = false; // 0時基準モード

// --- 温度帯カラー ---
function tempColor(t) {
  if (t == null) return isDark ? '#aaa' : '#333';
  if (t < 0) return isDark ? '#64b5f6' : '#1565c0';
  if (t < 10) return '#42a5f5';
  if (t < 20) return isDark ? '#66bb6a' : '#43a047';
  if (t < 30) return isDark ? '#ffa726' : '#ef6c00';
  return isDark ? '#ef5350' : '#c62828';
}
// --- 湿度カラー ---
function humColor(h) {
  if (h == null) return isDark ? '#aaa' : '#333';
  if (h < 30) return isDark ? '#ffa726' : '#ef6c00';
  if (h < 60) return isDark ? '#66bb6a' : '#43a047';
  if (h < 80) return '#1e88e5';
  return isDark ? '#64b5f6' : '#1565c0';
}
// --- 風向ラベル ---
function dirLabel(deg) {
  if (deg == null) return '--';
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(deg / 22.5) % 16];
}
// --- バロメータゲージ ---
function initBaroGauge() {
  const svg = document.getElementById('baro-gauge');
  if (!svg) return;
  const cx = 36, cy = 33, R = 27;
  const minP = 970, maxP = 1050, minA = -110, maxA = 110;
  function pt(a) {
    const r = a * Math.PI / 180;
    return [cx + R * Math.sin(r), cy - R * Math.cos(r)];
  }
  const [sx, sy] = pt(minA), [ex, ey] = pt(maxA);
  let s = '';
  // 目盛り弧
  const arcC = isDark ? '#333' : '#e8e8e8';
  const majC = isDark ? '#666' : '#bbb';
  const minC = isDark ? '#444' : '#ddd';
  s += `<path d="M${sx.toFixed(2)} ${sy.toFixed(2)} A${R} ${R} 0 1 1 ${ex.toFixed(2)} ${ey.toFixed(2)}" fill="none" stroke="${arcC}" stroke-width="4"/>`;
  // 目盛り線
  for (let p = minP; p <= maxP; p += 5) {
    const isMajor = p % 10 === 0;
    const a = minA + (p - minP) / (maxP - minP) * (maxA - minA);
    const rad = a * Math.PI / 180;
    const r0 = R, r1 = R - (isMajor ? 6 : 3);
    const x1 = cx + r0 * Math.sin(rad), y1 = cy - r0 * Math.cos(rad);
    const x2 = cx + r1 * Math.sin(rad), y2 = cy - r1 * Math.cos(rad);
    s += `<line x1="${x1.toFixed(2)}" y1="${y1.toFixed(2)}" x2="${x2.toFixed(2)}" y2="${y2.toFixed(2)}" stroke="${isMajor ? majC : minC}" stroke-width="${isMajor ? 1.5 : 1}"/>`;
  }
  // トレンド矢印（先に描画→テキストの奥に）
  // 回転0°=真上(↑)→90°=右(→)→180°=真下(↓)、初期90°
  // 柄の中点=正円中心(cx,cy)、全長40px(±20)
  // ボディ幅8px(±4)、矢じり幅20px(±10)
  s += `<g id="baro-trend" transform="translate(${cx},${cy}) rotate(90)"><path d="M-4 20 L-4 -6 L-10 -6 L0 -20 L10 -6 L4 -6 L4 20 Z" fill="rgba(180,180,180,0.35)"/></g>`;
  // 数値（正円の中央、矢印より手前）
  const valC = isDark ? '#DCE6E8' : '#333';
  const lblC = isDark ? '#777' : '#aaa';
  s += `<text id="baro-val" x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="${valC}">--</text>`;
  s += `<text x="${cx}" y="55" text-anchor="middle" font-size="6.5" fill="${lblC}">hPa</text>`;
  svg.innerHTML = s;
}
function updateBaroGauge(pressure, slope6h) {
  initBaroGauge();
  const valEl = document.getElementById('baro-val');
  if (valEl) valEl.textContent = pressure != null ? pressure.toFixed(1) : '--';
  const trendG = document.getElementById('baro-trend');
  if (trendG) {
    // +10hPa/6h→0°(↑), 0→90°(→), -10hPa/6h→180°(↓)
    let rotation = 90, color = 'rgba(180,180,180,0.35)';
    if (slope6h != null) {
      rotation = Math.max(0, Math.min(180, 90 - (slope6h / 10) * 90));
      const t = Math.min(1, Math.abs(slope6h) / 10);
      if (t >= 0.05) {
        const cr = Math.round(21 + t * 208);
        const cg = Math.round(101 - t * 44);
        const cb = Math.round(192 - t * 139);
        color = `rgba(${cr},${cg},${cb},0.45)`;
      }
    }
    trendG.setAttribute('transform', `translate(36,33) rotate(${rotation.toFixed(1)})`);
    trendG.innerHTML = `<path d="M-4 20 L-4 -6 L-10 -6 L0 -20 L10 -6 L4 -6 L4 20 Z" fill="${color}"/>`;
  }
}
// --- 現在値パネル更新 ---
function updateCurrent(r) {
  // 気温
  const tEl = document.getElementById('cur-temp');
  tEl.textContent = fmt(r.temperature);
  tEl.style.color = tempColor(r.temperature);
  const tf = document.getElementById('thermo-fill');
  if (tf && r.temperature != null) {
    const pct = Math.max(0, Math.min(100, (r.temperature + 10) / 50 * 100));
    const h = 2 + pct * 0.16;
    tf.setAttribute('height', h.toFixed(1));
    tf.setAttribute('y', (28 - h).toFixed(1));
    tf.setAttribute('fill', tempColor(r.temperature));
  }
  // 体感温度 (Australian Apparent Temperature)
  const feelsEl = document.getElementById('cur-feels');
  if (feelsEl) {
    if (r.temperature != null) {
      const T = r.temperature, rh = r.humidity ?? 50, ws = r.wind_avg ?? 0;
      const e = rh / 100 * 6.105 * Math.exp(17.27 * T / (237.7 + T));
      const at = T + 0.33 * e - 0.70 * ws - 4.0;
      feelsEl.textContent = at.toFixed(1);
      feelsEl.style.color = tempColor(at);
    } else { feelsEl.textContent = '--'; }
  }
  // 湿度
  const hEl = document.getElementById('cur-hum');
  hEl.textContent = fmt(r.humidity);
  hEl.style.color = humColor(r.humidity);
  const hDrop = document.getElementById('hum-drop');
  if (hDrop && r.humidity != null) {
    const hc = humColor(r.humidity);
    hDrop.setAttribute('fill', hc + '30');
    hDrop.setAttribute('stroke', hc);
  }
  // 雨量 — 円柱ゲージ(24h積算) + 瞬間雨量
  document.getElementById('cur-rain').textContent = fmt(r.rainfall_rate);
  const r24 = dashRain24h;
  const cylText = document.getElementById('rain-cyl-text');
  if (cylText) cylText.textContent = r24.toFixed(1);
  const cylFill = document.getElementById('rain-cyl-fill');
  const cylSurf = document.getElementById('rain-cyl-surface');
  if (cylFill) {
    const pct = Math.min(100, (r24 / 50) * 100);
    const fillH = pct / 100 * 56;
    cylFill.setAttribute('y', (68 - fillH).toFixed(1));
    cylFill.setAttribute('height', fillH.toFixed(1));
    if (cylSurf) {
      if (fillH > 0) { cylSurf.setAttribute('cy', (68 - fillH).toFixed(1)); cylSurf.setAttribute('visibility', 'visible'); }
      else { cylSurf.setAttribute('visibility', 'hidden'); }
    }
  }
  // 風向風速 — コンパス
  const arrow = document.getElementById('wind-arrow');
  if (arrow) {
    if (r.wind_dir != null) arrow.setAttribute('transform', 'translate(40,40) rotate(' + r.wind_dir + ')');
    // 風速で矢印の色を変化 (m/s): 無風=青灰 → 強風=赤
    const ws = r.wind_avg;
    let wColor;
    if (ws == null)    wColor = 'rgba(120,140,150,0.4)';
    else if (ws < 2)   wColor = 'rgba(100,181,246,0.55)';  // 弱: 水色
    else if (ws < 5)   wColor = 'rgba(76,175,80,0.6)';     // 並: 緑
    else if (ws < 10)  wColor = 'rgba(255,193,7,0.65)';    // やや強: 黄
    else if (ws < 15)  wColor = 'rgba(255,152,0,0.7)';     // 強: オレンジ
    else               wColor = 'rgba(229,57,53,0.75)';    // 暴風: 赤
    const arrowPath = arrow.querySelector('path');
    if (arrowPath) arrowPath.setAttribute('fill', wColor);
  }
  const wsTxt = document.getElementById('wind-spd-txt');
  if (wsTxt) wsTxt.textContent = r.wind_avg != null ? r.wind_avg.toFixed(1) : '--';
  // 照度
  document.getElementById('cur-lux').textContent = r.illuminance != null ? Math.round(r.illuminance).toLocaleString() : '--';
  // UV
  const uvEl = document.getElementById('cur-uv');
  uvEl.textContent = fmt(r.uv_index);
  if (r.uv_index != null) {
    uvEl.style.color = r.uv_index < 3 ? '#43a047' : r.uv_index < 6 ? '#ef6c00' : r.uv_index < 8 ? '#e53935' : '#7b1fa2';
  }
  // 大気圧ゲージ + 6時間傾向（最小二乗法）
  {
    const pData = chartPress.data.datasets[0].data;
    const nowMs = r.recorded_at * 1000;
    const ago6h = nowMs - 6 * 3600000;
    const pts = [];
    for (let i = 0; i < pData.length; i++) {
      const px = pData[i].x instanceof Date ? pData[i].x.getTime() : pData[i].x;
      if (px >= ago6h && pData[i].y != null) pts.push({ x: px, y: pData[i].y });
    }
    let slope6h = null;
    if (pts.length >= 2) {
      const x0 = pts[0].x;
      let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
      const n = pts.length;
      for (const p of pts) {
        const xh = (p.x - x0) / 3600000;
        sumX += xh; sumY += p.y; sumXY += xh * p.y; sumX2 += xh * xh;
      }
      const denom = n * sumX2 - sumX * sumX;
      if (denom !== 0) slope6h = (n * sumXY - sumX * sumY) / denom * 6;
    }
    updateBaroGauge(r.pressure, slope6h);
  }
  // 更新時刻
  document.getElementById('timeInfo').textContent = '最終更新: ' + ts(r.recorded_at).toLocaleString('ja-JP');
}

// =============================================
// 範囲別 時間軸設定テーブル
// unit/step   : グリッド線の間隔
// mStep       : モバイル時のグリッド間隔
// hourLabels  : true=正時のみラベル表示（サブ刻みは縦線のみ）
// labelFmt    : ラベル表示フォーマット
// tipFmt      : ツールチップフォーマット
// =============================================
const RANGE_AXIS = {
  6:   { unit:'hour',  step:1,  mStep:2,  zebraMin:15,   showHourNum:true,  tipFmt:'yyyy/MM/dd HH:mm:ss' },
  12:  { unit:'hour',  step:1,  mStep:2,  zebraMin:15,   showHourNum:true,  tipFmt:'yyyy/MM/dd HH:mm:ss' },
  24:  { unit:'hour',  step:1,  mStep:2,  zebraMin:30,   showHourNum:true,  tipFmt:'yyyy/MM/dd HH:mm:ss' },
  48:  { unit:'hour',  step:3,  mStep:6,  zebraMin:60,   showHourNum:true,  tipFmt:'yyyy/MM/dd HH:mm' },
  72:  { unit:'hour',  step:6,  mStep:12, zebraMin:120,  showHourNum:true,  tipFmt:'yyyy/MM/dd HH:mm' },
  168: { unit:'hour',  step:12, mStep:24, zebraMin:360,  showHourNum:false, labelFmt:'M/d HH:mm', tipFmt:'yyyy/MM/dd HH:mm' },
  336: { unit:'day',   step:1,  mStep:2,  zebraMin:720,  showHourNum:false, labelFmt:'M/d',        tipFmt:'yyyy/MM/dd' },
  744: { unit:'day',   step:2,  mStep:4,  zebraMin:1440, showHourNum:false, labelFmt:'M/d',        tipFmt:'yyyy/MM/dd' },
};

function getAxisCfg(hours) {
  return RANGE_AXIS[hours] || RANGE_AXIS[24];
}

function isMobile() { return window.innerWidth < 500; }

// step(unit単位) → 分に変換
function stepToMin(cfg, step) {
  if (cfg.unit === 'hour') return step * 60;
  if (cfg.unit === 'day')  return step * 1440;
  return step; // minute
}

// ローカル時刻を stepMin 分単位の正時境界に丸める
function alignTime(ms, stepMin, roundUp) {
  const d = new Date(ms);
  if (stepMin >= 1440) {
    // 日単位: 午前0時に揃える
    d.setHours(0, 0, 0, 0);
    if (roundUp && d.getTime() < ms) d.setDate(d.getDate() + 1);
    return d.getTime();
  }
  const dayStart = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
  const elapsed = (ms - dayStart) / 60000;
  const aligned = roundUp
    ? Math.ceil(elapsed / stepMin) * stepMin
    : Math.floor(elapsed / stepMin) * stepMin;
  return dayStart + aligned * 60000;
}

// --- ゼブラ表示プラグイン（ローカル午前0時基準で独立計算） ---
const zebraPlugin = {
  id: 'zebra',
  beforeDatasetsDraw(chart) {
    const { ctx, chartArea } = chart;
    if (!chartArea) return;
    const { top, bottom, left, right } = chartArea;
    const xScale = chart.scales.x;
    if (!xScale) return;
    const cfg = getAxisCfg(currentRangeHours);
    const zMs = cfg.zebraMin * 60000;
    // ローカル午前0時を基準にバンドを計算
    const d = new Date(xScale.min);
    const day0 = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
    let b = Math.floor((xScale.min - day0) / zMs);
    let t = day0 + b * zMs;
    ctx.save();
    while (t < xScale.max) {
      const next = t + zMs;
      if (b % 2 === 0) {
        const x1 = Math.max(xScale.getPixelForValue(t), left);
        const x2 = Math.min(xScale.getPixelForValue(next), right);
        if (x2 > x1) {
          ctx.fillStyle = isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.03)';
          ctx.fillRect(x1, top, x2 - x1, bottom - top);
        }
      }
      t = next;
      b++;
    }
    ctx.restore();
  }
};
Chart.register(zebraPlugin);

// --- 日没・日の出計算（US Naval Observatory 簡易アルゴリズム） ---
const SUN_LAT = 36.148591106319216;
const SUN_LON = 140.043032858851;

function calcSunTimeMs(year, month, day, lat, lng, rising) {
  const toRad = Math.PI / 180, toDeg = 180 / Math.PI;
  const N1 = Math.floor(275 * month / 9);
  const N2 = Math.floor((month + 9) / 12);
  const N3 = 1 + Math.floor((year - 4 * Math.floor(year / 4) + 2) / 3);
  const N = N1 - N2 * N3 + day - 30;
  const lngHour = lng / 15;
  const t = rising ? N + (6 - lngHour) / 24 : N + (18 - lngHour) / 24;
  const M = 0.9856 * t - 3.289;
  let L = M + 1.916 * Math.sin(M * toRad) + 0.020 * Math.sin(2 * M * toRad) + 282.634;
  L = ((L % 360) + 360) % 360;
  let RA = toDeg * Math.atan(0.91764 * Math.tan(L * toRad));
  RA = ((RA % 360) + 360) % 360;
  RA += Math.floor(L / 90) * 90 - Math.floor(RA / 90) * 90;
  RA /= 15;
  const sinDec = 0.39782 * Math.sin(L * toRad);
  const cosDec = Math.cos(Math.asin(sinDec));
  const cosH = (Math.cos(90.833 * toRad) - sinDec * Math.sin(lat * toRad))
    / (cosDec * Math.cos(lat * toRad));
  if (cosH > 1 || cosH < -1) return null;
  const H = rising ? (360 - toDeg * Math.acos(cosH)) / 15 : toDeg * Math.acos(cosH) / 15;
  let UT = H + RA - 0.06571 * t - 6.622 - lngHour;
  UT = ((UT % 24) + 24) % 24;
  return Date.UTC(year, month - 1, day) + UT * 3600000;
}

// --- 夜間帯オーバーレイプラグイン ---
// UTC 日ごとに日出・日没イベントを収集し、時系列でソートしてペアリングする
// → タイムゾーンの日付境界を意識せず正しく夜間帯を描画できる
const nightPlugin = {
  id: 'night',
  beforeDatasetsDraw(chart) {
    const { ctx, chartArea } = chart;
    if (!chartArea) return;
    const { top, bottom, left, right } = chartArea;
    const xScale = chart.scales.x;
    if (!xScale) return;

    // 表示範囲 ±2 日のマージンで日出・日没イベントを収集
    const events = [];
    const d0 = new Date(xScale.min);
    d0.setUTCDate(d0.getUTCDate() - 2);
    d0.setUTCHours(0, 0, 0, 0);
    const d1 = new Date(xScale.max);
    d1.setUTCDate(d1.getUTCDate() + 2);

    for (let d = new Date(d0); d <= d1; d.setUTCDate(d.getUTCDate() + 1)) {
      const rise = calcSunTimeMs(d.getUTCFullYear(), d.getUTCMonth() + 1, d.getUTCDate(), SUN_LAT, SUN_LON, true);
      const set  = calcSunTimeMs(d.getUTCFullYear(), d.getUTCMonth() + 1, d.getUTCDate(), SUN_LAT, SUN_LON, false);
      if (rise != null) events.push({ t: rise, type: 'r' });
      if (set  != null) events.push({ t: set,  type: 's' });
    }
    events.sort((a, b) => a.t - b.t);

    // 日没→翌日出 のペアを描画
    ctx.save();
    ctx.fillStyle = isDark ? 'rgba(0,0,0,0.3)' : 'rgba(15,15,50,0.13)';
    for (let i = 0; i < events.length - 1; i++) {
      if (events[i].type === 's' && events[i + 1].type === 'r') {
        const ns = Math.max(events[i].t, xScale.min);
        const ne = Math.min(events[i + 1].t, xScale.max);
        if (ne > ns) {
          const x1 = Math.max(xScale.getPixelForValue(ns), left);
          const x2 = Math.min(xScale.getPixelForValue(ne), right);
          if (x2 > x1) {
            ctx.fillRect(x1, top, x2 - x1, bottom - top);
          }
        }
      }
    }
    ctx.restore();
  }
};
Chart.register(nightPlugin);

// --- Y軸グリッド強調ヘルパー ---
// majorStep 毎に強調線、extraZero=true なら 0 を更に強調
function yGridColor(majorStep, extraZero) {
  return function(ctx) {
    if (!ctx.tick) return isDark ? '#2a2a2a' : '#e0e0e0';
    const v = ctx.tick.value;
    if (extraZero && v === 0) return isDark ? 'rgba(100,160,255,0.5)' : 'rgba(0,0,200,0.6)';
    if (v % majorStep === 0) return isDark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.3)';
    return isDark ? '#2a2a2a' : '#e0e0e0';
  };
}
function yGridWidth(majorStep, extraZero) {
  return function(ctx) {
    if (!ctx.tick) return 0.5;
    const v = ctx.tick.value;
    if (extraZero && v === 0) return 2;
    if (v % majorStep === 0) return 1.5;
    return 0.5;
  };
}

// --- 0時基準: 終了時刻を正時境界にスナップ ---
function calcSnapEnd(hours) {
  const now = new Date(Date.now() + timeOffset);
  const d = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  if (hours <= 6) {
    // 6h刻み: 次の 0,6,12,18 時
    const h = now.getHours();
    const next6 = Math.ceil((h + 0.01) / 6) * 6;
    d.setHours(next6, 0, 0, 0);
    return d.getTime();
  }
  if (hours <= 12) {
    // 12h刻み: 次の 0,12 時
    const h = now.getHours();
    const next12 = Math.ceil((h + 0.01) / 12) * 12;
    d.setHours(next12, 0, 0, 0);
    return d.getTime();
  }
  // 24h以上: 翌日0時
  d.setDate(d.getDate() + 1);
  return d.getTime();
}

// --- 時間軸を範囲に合わせて再設定 ---
function applyTimeAxis(hours) {
  const cfg = getAxisCfg(hours);
  const step = isMobile() ? cfg.mStep : cfg.step;
  const sMin = stepToMin(cfg, step);

  let end;
  if (snapToZero) {
    end = calcSnapEnd(hours);
  } else {
    end = Date.now() + timeOffset;
  }
  const axisMax = alignTime(end, sMin, true);
  const axisMin = alignTime(end - hours * 3600000, sMin, false);

  const fmtObj = cfg.showHourNum
    ? { minute: 'HH:mm', hour: 'HH:mm', day: 'M/d' }
    : { minute: cfg.labelFmt, hour: cfg.labelFmt, day: cfg.labelFmt };

  const tickCb = cfg.showHourNum
    ? function(value) { return String(new Date(value).getHours()); }
    : null;

  allCharts.forEach(c => {
    const x = c.options.scales.x;
    x.min = axisMin;
    x.max = axisMax;
    x.time.unit = cfg.unit;
    x.time.stepSize = step;
    x.ticks.stepSize = step;
    x.time.tooltipFormat = cfg.tipFmt;
    x.time.displayFormats = fmtObj;
    x.ticks.callback = tickCb;
    x.grid.color = isDark ? '#444' : '#bbb';
  });
}

// --- データ操作 ---
// 積算雨量 = sum(rainfall_delta)（実値ベース）
// ※ rainfall_delta はサーバ側で異常値（apparent rate > 100 mm/h）を除外済み。
//   グラフは Chart.js が点間を線形補間するため、ギャップ前後の delta もなだらかに表示される。
let rainAccum = 0;
let rainLastDay = -1;
// ダッシュボード用24h雨量（グラフ範囲に依存しない）
let dashRain24h = 0;
let dashRainLastDay = -1;
let dashRainInited = false;

function clearCharts() {
  allCharts.forEach(c => c.data.datasets.forEach(ds => { ds.data = []; }));
  rainAccum = 0;
  rainLastDay = -1;
}

function pushPoint(r) {
  const t = ts(r.recorded_at);
  // 24時間積算雨量（日付変更でリセット）
  const day = t.getDate();
  if (rainLastDay !== -1 && day !== rainLastDay) rainAccum = 0;
  rainLastDay = day;
  if (r.rainfall_delta != null) rainAccum += r.rainfall_delta;

  chartTemp.data.datasets[0].data.push({ x: t, y: r.temperature });
  // 露点温度 (Magnus近似: Td = T - (100-RH)/5)
  const dewPt = (r.temperature != null && r.humidity != null)
    ? r.temperature - (100 - r.humidity) / 5 : null;
  chartTemp.data.datasets[1].data.push({ x: t, y: dewPt });
  chartHum.data.datasets[0].data.push({ x: t, y: r.humidity });
  chartRain.data.datasets[0].data.push({ x: t, y: r.rainfall_rate });
  chartRain.data.datasets[1].data.push({ x: t, y: rainAccum });
  chartWind.data.datasets[0].data.push({ x: t, y: r.wind_avg });
  chartWind.data.datasets[1].data.push({ x: t, y: r.wind_gust });
  if (r.wind_dir != null) chartWindDir.data.datasets[0].data.push({ x: t, y: r.wind_dir });
  chartLight.data.datasets[0].data.push({ x: t, y: r.illuminance });
  chartUV.data.datasets[0].data.push({ x: t, y: r.uv_index });
  if (r.pressure != null) chartPress.data.datasets[0].data.push({ x: t, y: r.pressure });
}

// --- 風向トレンドライン（ベクトル移動平均） ---
function updateWindDirTrend() {
  const raw = chartWindDir.data.datasets[0].data;
  if (raw.length < 5) { chartWindDir.data.datasets[1].data = []; return; }
  const win = Math.max(5, Math.floor(raw.length / 30));
  const trend = [];
  for (let i = 0; i < raw.length; i++) {
    let sinSum = 0, cosSum = 0, n = 0;
    const lo = Math.max(0, i - win), hi = Math.min(raw.length - 1, i + win);
    for (let j = lo; j <= hi; j++) {
      const rad = raw[j].y * Math.PI / 180;
      sinSum += Math.sin(rad);
      cosSum += Math.cos(rad);
      n++;
    }
    let avg = Math.atan2(sinSum / n, cosSum / n) * 180 / Math.PI;
    if (avg < 0) avg += 360;
    trend.push({ x: raw[i].x, y: avg });
  }
  chartWindDir.data.datasets[1].data = trend;
}

function updateCharts() {
  updateWindDirTrend();
  allCharts.forEach(c => c.update());
}

// --- データ取得 ---
function loadData(hours) {
  currentRangeHours = hours;
  let endMs;
  if (snapToZero) {
    endMs = calcSnapEnd(hours);
  } else {
    endMs = Date.now() + timeOffset;
  }
  const endSec = endMs / 1000;
  const since = endSec - hours * 3600;
  clearCharts();
  applyTimeAxis(hours);

  let url = `/api/weather/latest?since=${since}&max_points=600`;
  if (snapToZero || timeOffset < 0) url += `&until=${endSec}`;

  fetch(url)
    .then(r => r.json())
    .then(data => {
      if (data.length) {
        data.forEach(pushPoint);
      }
      // 初回ロード時: チャート雨量からダッシュ用雨量を初期化
      if (!dashRainInited) {
        dashRain24h = rainAccum;
        dashRainLastDay = rainLastDay;
        dashRainInited = true;
      }
      updateCharts();
      updateNav();
      fetchDashboard(); // 常に最新レコードでコンパクト表示を更新
    });
}

const dot = document.getElementById('statusDot');

function connectSSE() {
  const es = new EventSource('/api/weather/stream');
  es.addEventListener('weather', e => {
    const r = JSON.parse(e.data);
    // ダッシュボード用雨量を更新（実値ベース）
    const sseDay = new Date(r.recorded_at * 1000).getDate();
    if (dashRainLastDay !== -1 && sseDay !== dashRainLastDay) dashRain24h = 0;
    dashRainLastDay = sseDay;
    if (r.rainfall_delta != null) dashRain24h += r.rainfall_delta;
    updateCurrent(r);
    // 過去表示中またはスナップモードで未来端固定中はグラフ更新しない
    if (timeOffset < 0) return;
    if (snapToZero) { applyTimeAxis(currentRangeHours); }
    else {
      // 軸ウィンドウをスライド
      const cfg = getAxisCfg(currentRangeHours);
      const step = isMobile() ? cfg.mStep : cfg.step;
      const sMin = stepToMin(cfg, step);
      const now = Date.now();
      const axisMax = alignTime(now, sMin, true);
      const axisMin = alignTime(now - currentRangeHours * 3600000, sMin, false);
      allCharts.forEach(c => {
        const x = c.options.scales.x;
        x.min = axisMin;
        x.max = axisMax;
      });
    }
    // 範囲内ならグラフに追加
    const xMin = allCharts[0].options.scales.x.min;
    if (r.recorded_at * 1000 >= xMin) {
      pushPoint(r);
      allCharts.forEach(c => {
        c.data.datasets.forEach(ds => { if (ds.data.length > 600) ds.data.shift(); });
      });
    }
    updateCharts();
    updateNav();
  });
  es.onopen = () => { dot.classList.remove('offline'); };
  es.onerror = () => {
    dot.classList.add('offline');
    es.close();
    setTimeout(connectSSE, 5000);
  };
}
connectSSE();

function loadExtremes() {
  const tzOff = -new Date().getTimezoneOffset(); // 分 (JST=540)
  fetch(`/api/weather/extremes?days=3&tz_offset=${tzOff}`)
    .then(r => r.json())
    .then(data => {
      // data は day_num 降順（今日, 昨日, 一昨日）
      const now = new Date();
      const todayNum = Math.floor((now.getTime() / 1000 + tzOff * 60) / 86400);
      const rows = [
        ['temp_max',     v => v != null ? v.toFixed(1) + ' °C' : '--'],
        ['temp_min',     v => v != null ? v.toFixed(1) + ' °C' : '--'],
        ['hum_max',      v => v != null ? v.toFixed(1) + ' %' : '--'],
        ['hum_min',      v => v != null ? v.toFixed(1) + ' %' : '--'],
        ['wind_max',     v => v != null ? v.toFixed(1) + ' m/s' : '--'],
        ['lux_max',      v => v != null ? Math.round(v) + ' lux' : '--'],
        ['uv_max',       v => v != null ? v.toFixed(1) : '--'],
        ['rain_rate_max',v => v != null ? v.toFixed(1) + ' mm/h' : '--'],
        ['rain_24h',     v => v != null ? v.toFixed(1) + ' mm' : '--'],
      ];
      // day_num → column index (0=今日, 1=昨日, 2=一昨日)
      const byCol = {};
      data.forEach(d => {
        const col = todayNum - d.day_num;
        if (col >= 0 && col < 3) byCol[col] = d;
      });
      // ヘッダー日付更新
      for (let c = 0; c < 3; c++) {
        const dt = new Date((todayNum - c) * 86400 * 1000 - tzOff * 60000);
        const label = c === 0 ? '今日' : c === 1 ? '昨日' : '一昨日';
        document.getElementById('extH' + c).textContent = `${label} (${dt.getMonth()+1}/${dt.getDate()})`;
      }
      rows.forEach(([ key, fmtFn ], ri) => {
        for (let ci = 0; ci < 3; ci++) {
          const el = document.getElementById('e' + ri + ci);
          const d = byCol[ci];
          el.textContent = d ? fmtFn(d[key]) : '--';
        }
      });
    });
}

function fmtDt(d) {
  if (!(d instanceof Date)) d = new Date(d);
  const M = String(d.getMonth()+1).padStart(2,'0');
  const D = String(d.getDate()).padStart(2,'0');
  const h = String(d.getHours()).padStart(2,'0');
  const m = String(d.getMinutes()).padStart(2,'0');
  const s = String(d.getSeconds()).padStart(2,'0');
  return `${d.getFullYear()}/${M}/${D} ${h}:${m}:${s}`;
}

function fmtVal(v) {
  if (v == null) return '';
  return typeof v === 'number' ? (Number.isInteger(v) ? String(v) : v.toFixed(2)) : String(v);
}

function openDataTable(chartId) {
  const chart = chartMap[chartId];
  if (!chart) return;
  const datasets = chart.data.datasets;
  // Merge all timestamps
  const timeSet = new Set();
  datasets.forEach(ds => {
    if (ds.hidden) return;
    ds.data.forEach(pt => {
      const t = pt.x instanceof Date ? pt.x.getTime() : (typeof pt.x === 'number' ? pt.x : new Date(pt.x).getTime());
      timeSet.add(t);
    });
  });
  const times = Array.from(timeSet).sort((a, b) => b - a); // newest first
  const visDs = datasets.filter(ds => !ds.hidden);

  // Build lookup per dataset
  const lookups = visDs.map(ds => {
    const map = new Map();
    ds.data.forEach(pt => {
      const t = pt.x instanceof Date ? pt.x.getTime() : (typeof pt.x === 'number' ? pt.x : new Date(pt.x).getTime());
      map.set(t, pt.y);
    });
    return map;
  });

  // Title
  const titleEl = document.querySelector(`[data-chart="${chartId}"]`).closest('h2');
  const titleText = titleEl.childNodes[0].textContent.trim();
  dataModalTitle.textContent = titleText + ' データ一覧';

  // Build table HTML
  let html = '<thead><tr><th>日時</th>';
  visDs.forEach(ds => { html += `<th>${ds.label}</th>`; });
  html += '</tr></thead><tbody>';

  const maxRows = 2000;
  const len = Math.min(times.length, maxRows);
  for (let i = 0; i < len; i++) {
    html += `<tr><td>${fmtDt(times[i])}</td>`;
    lookups.forEach(map => {
      html += `<td>${fmtVal(map.get(times[i]))}</td>`;
    });
    html += '</tr>';
  }
  if (times.length > maxRows) {
    html += `<tr><td colspan="${visDs.length + 1}" style="text-align:center;color:var(--md-sys-color-on-surface-variant)">... ${times.length - maxRows}件省略</td></tr>`;
  }
  html += '</tbody>';
  dataModalTable.innerHTML = html;

  dataOverlay.classList.add('open');
}

function closeDataTable() {
  dataOverlay.classList.remove('open');
}

document.querySelectorAll('.tbl-btn[data-chart]').forEach(btn => {
  btn.addEventListener('click', () => openDataTable(btn.dataset.chart));
});
document.getElementById('dataModalClose').addEventListener('click', closeDataTable);
dataOverlay.addEventListener('click', e => {
  if (e.target === dataOverlay) closeDataTable();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && dataOverlay.classList.contains('open')) closeDataTable();
});
